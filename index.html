<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL INTERFACE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050a14; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        .container { width: 95%; max-width: 900px; height: 85vh; background: #0d1626; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #00d2ff33; overflow: hidden; }
        .header { padding: 15px; text-align: center; background: #000; border-bottom: 1px solid #00d2ff33; }
        .header h1 { font-size: 1.2rem; letter-spacing: 3px; color: #00d2ff; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #0d1626, #050a14); }
        .m { padding: 12px 16px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .u { align-self: flex-end; background: #00d2ff; color: #000; font-weight: bold; }
        .a { align-self: flex-start; background: #ffffff0d; border: 1px solid #ffffff1a; }
        .bar { padding: 20px; display: flex; gap: 10px; background: #0000004d; }
        input { flex: 1; background: #1a263d; border: 1px solid #ffffff1a; padding: 14px; border-radius: 6px; color: #fff; outline: none; }
        button { background: #00d2ff; color: #000; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>NEURAL INTERFACE</h1></div>
    <div id="chat"></div>
    <div class="bar">
        <input type="text" id="in" placeholder="Comando..." autocomplete="off">
        <button id="go">EXECUTAR</button>
    </div>
</div>
<script>
    const K = "AIzaSyCEz_b_U76SN1KTzd_JBtcNrrEmuMgfYXU";
    // URL ATUALIZADA PARA O MODELO 1.5 FLASH
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${K}`;
    const box = document.getElementById('chat');
    const input = document.getElementById('in');

    async function send() {
        const v = input.value.trim();
        if(!v) return;
        add(v, 'u');
        input.value = '';
        const b = add("Aguarde...", "a");
        try {
            const r = await fetch(URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: v}]}]})
            });
            const d = await r.json();
            if(d.candidates) {
                b.innerText = d.candidates[0].content.parts[0].text;
            } else {
                b.innerText = "ERRO: Verifique se sua chave ainda é válida ou se a cota acabou.";
            }
        } catch(e) { b.innerText = "ERRO DE CONEXÃO."; }
    }

    function add(t, c) {
        const d = document.createElement('div');
        d.className = `m ${c}`;
        d.innerText = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }
    document.getElementById('go').onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
