<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System v2.0</title>
    <style>
        :root {
            --bg-dark: #050a14;
            --card-bg: #0d1626;
            --accent: #00d2ff;
            --text-main: #e0e6ed;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #111d35 0%, #050a14 100%);
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: var(--accent);
            color: #000;
            font-weight: 500;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: #1a263d;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 14px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Loading Dots */
        .typing { font-style: italic; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Neural Interface</h1></div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Comando para a IA..." autocomplete="off">
        <button id="sendBtn">EXECUTAR</button>
    </div>
</div>

<script>
    const KEY = "AIzaSyCEz_b_U76SN1KTzd_JBtcNrrEmuMgfYXU";
    const box = document.getElementById('chat-box');
    const input = document.getElementById('prompt');
    const btn = document.getElementById('sendBtn');

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    async function askAI() {
        const query = input.value.trim();
        if(!query) return;

        appendMsg(query, 'user-msg');
        input.value = '';
        
        const loading = appendMsg("Processando dados...", "ai-msg");

        try {
            // URL atualizada para o modelo Gemini 1.5 Flash (mais rápido e estável)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: query }] }]
                })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                loading.innerText = data.candidates[0].content.parts[0].text;
            } else {
                loading.innerText = "Erro: A API retornou um formato inesperado. Verifique sua cota.";
            }

        } catch (e) {
            loading.innerText = "Falha de conexão. Verifique o console (F12).";
            console.error(e);
        }
    }

    btn.addEventListener('click', askAI);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') askAI(); });
</script>

</body>
</html>
