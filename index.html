<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha IA Pessoal</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        #chat-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>Interface da IA</h2>
        <input type="text" id="userInput" placeholder="Pergunte algo...">
        <button onclick="enviarPergunta()">Enviar</button>
        
        <div id="output">A resposta aparecerá aqui...</div>
    </div>

    <script
        const API_KEY = "AIzaSyCEz_b_U76SN1KTzd_JBtcNrrEmuMgfYXU";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

        async function enviarPergunta() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            
            if (!input) return alert("Digite algo!");

            output.innerText = "Pensando...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: input }] }]
                    })
                });

                const data = await response.json()
                const respostaIA = data.candidates[0].content.parts[0].text;
                output.innerText = respostaIA;

            } catch (error) {
                console.error("Erro na requisição:", error);
                output.innerText = "Erro ao buscar informações. Verifique o console.";
            }
        }
    </script>
</body>
</html>
