<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CORE SYSTEM - TOGETHER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b132b; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        .chat-container { width: 95%; max-width: 1000px; height: 90vh; background: #1c2541; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 60px #000; border: 1px solid #3a506b; overflow: hidden; }
        .header { padding: 25px; background: #0b132b; text-align: center; border-bottom: 2px solid #3a506b; }
        .header h2 { color: #5bc0be; letter-spacing: 5px; text-transform: uppercase; }
        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle, #1c2541, #0b132b); }
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 75%; font-size: 16px; line-height: 1.6; }
        .user { align-self: flex-end; background: #5bc0be; color: #0b132b; font-weight: 600; }
        .ai { align-self: flex-start; background: #3a506b; color: #fff; border: 1px solid #5bc0be33; }
        .input-bar { padding: 25px; background: #0b132b; display: flex; gap: 15px; border-top: 1px solid #3a506b; }
        input { flex: 1; background: #1c2541; border: 1px solid #3a506b; padding: 18px; border-radius: 12px; color: white; outline: none; }
        button { background: #5bc0be; border: none; padding: 0 35px; border-radius: 12px; color: #0b132b; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header"><h2>AI CORE SYSTEM</h2></div>
    <div id="chat-window"><div class="msg ai">SISTEMA TOGETHER ONLINE.</div></div>
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Digite seu comando..." autocomplete="off">
        <button id="btn">ENVIAR</button>
    </div>
</div>

<script>
    // 1. COLOQUE SUA CHAVE DA TOGETHER AI AQUI
    const API_KEY = "tgp_v1_1QAL6n8OztkheHky6if_7ltx7mC8ZbYbYUHl62Eu5DU"; 

    async function acao() {
        const win = document.getElementById('chat-window');
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        
        if (!txt) return;
        
        // Mensagem do usuário
        const uDiv = document.createElement('div');
        uDiv.className = 'msg user';
        uDiv.innerText = txt;
        win.appendChild(uDiv);
        inp.value = '';

        // Mensagem da IA (Aguardando)
        const b = document.createElement('div');
        b.className = 'msg ai';
        b.innerText = "Pensando...";
        win.appendChild(b);
        win.scrollTop = win.scrollHeight;

        try {
            const r = await fetch("https://api.together.xyz/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "meta-llama/Llama-3-8b-chat-hf",
                    messages: [{ role: "user", content: txt }],
                    max_tokens: 512
                })
            });

            const d = await r.json();
            if (d.choices && d.choices[0].message) {
                b.innerText = d.choices[0].message.content;
            } else {
                b.innerText = "ERRO: " + (d.error ? d.error.message : "Falha na resposta");
            }
        } catch (e) {
            b.innerText = "ERRO DE CONEXÃO. Verifique sua chave ou internet.";
        }
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('btn').onclick = acao;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') acao(); };
</script>
</body>
</html>
